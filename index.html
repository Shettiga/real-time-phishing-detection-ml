<!DOCTYPE html>
<html>
<head>
    <title>Phishing URL Detector</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 100px;
            background: #d29494;
        }
        input {
            width: 300px;
            padding: 10px;
        }
        button {
            padding: 10px 20px;
            background: #007BFF;
            color: white;
            border: none;
        }
        #result {
            margin-top: 20px;
            font-size: 20px;
        }
    </style>
</head>
<body>

    <h1>🔐 Phishing URL Detector</h1>

    <input type="text" id="url" placeholder="Enter URL">
    <br><br>
    <button onclick="checkURL()">Check</button>

    <div id="result"></div>

   <script>
async function checkURL() {
    const url = document.getElementById("url").value;

    try {
        const response = await fetch("http://127.0.0.1:5000/predict", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ url: url })
        });

        const data = await response.json();

        console.log(data);  // 🔍 DEBUG

        document.getElementById("result").innerHTML = data.prediction;

    } catch (error) {
        console.error(error);
        document.getElementById("result").innerHTML = "Error connecting to server";
    }
}
</script>

</body>
</html>
